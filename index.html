<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HOPR</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }
    .subtitle {
      color: #9ca3af;
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }
    .card h2 {
      font-size: 16px;
      margin-bottom: 10px;
    }
    a {
      display: block;
      color: #38bdf8;
      text-decoration: none;
      margin: 5px 0;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <h1>HOPR</h1>
  <div class="subtitle">Hunters Operations & Processes Resource</div>

  <div class="grid">
    
    <div class="card">
      <h2>Daily Ops</h2>

    </div>

    <div class="card">

    </div>

    <div class="card">

    </div>

    <div class="card">
