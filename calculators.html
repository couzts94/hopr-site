<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>HOPR - Calculators</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 5px;
    }

    .subtitle {
      color: #9ca3af;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
      max-width: 1000px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0 12px;
      border-radius: 6px;
      border: none;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      background: #334155;
      color: #e5e7eb;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #475569;
    }

    .result {
      margin-top: 12px;
      color: #38bdf8;
      font-weight: bold;
      font-size: 18px;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
    }
    
  select {
    width: 100%;
    padding: 10px;
    margin: 8px 0 12px;
    border-radius: 6px;
    border: none;
    box-sizing: border-box;
    font-size: 16px;
  }
    
  </style>
</head>

<body>

  <h1>Calculators</h1>
  <div class="subtitle">HOPR — Quick Calculation Tools</div>

  <div class="grid">

    <!-- Normal Calculator -->
    <div class="card">
      <h2>Basic Calculator</h2>

      <input type="text" id="basicCalc" placeholder="Example: 25 * 4 + 10">

      <button onclick="runBasicCalc()">Calculate</button>

      <div class="result" id="basicResult"></div>
    </div>

    <!-- Square Footage Calculator -->
    <div class="card">
      <h2>Square Footage</h2>

      <label>Length</label>
      <input type="number" id="length" placeholder="Enter length">

      <label>Width</label>
      <input type="number" id="width" placeholder="Enter width">

      <button onclick="calculateSqFt()">Calculate Sq Ft</button>

      <div class="result" id="sqftResult"></div>
    </div>

    <!-- Tax Calculator -->
    <div class="card">
      <h2>Tax Calculator</h2>

      <label>Subtotal</label>
      <input type="number" id="subtotal" placeholder="Enter subtotal">

      <button onclick="calculateTax()">Add 7.25% Tax</button>

      <div class="result" id="taxResult"></div>
    </div>

<!-- Grout Calculator -->
<div class="card">
  <h2>Grout Calculator</h2>

  <label>Project Square Footage</label>
  <input type="number" id="groutSqft" placeholder="Example: 120">

  <label>Tile Length (inches)</label>
  <input type="number" id="tileLength" placeholder="Example: 12">

  <label>Tile Width (inches)</label>
  <input type="number" id="tileWidth" placeholder="Example: 24">

  <label>Grout Joint Width</label>
  <select id="jointWidth">
    <option value="0.0625">1/16 inch</option>
    <option value="0.125" selected>1/8 inch</option>
    <option value="0.1875">3/16 inch</option>
    <option value="0.25">1/4 inch</option>
  </select>

  <label>Tile Thickness / Grout Depth - Inches</label>
  <input type="number" id="groutDepthInches" placeholder="Example: 0.25">

  <label>Tile Thickness / Grout Depth - MM</label>
  <input type="number" id="groutDepthMM" placeholder="Example: 6">

  <label>Coverage Per Bag / Container (sq ft)</label>
  <input type="number" id="bagCoverage" placeholder="Example: 100">

  <label>Waste Buffer</label>
  <select id="wasteBuffer">
    <option value="1">No waste</option>
    <option value="1.05">5%</option>
    <option value="1.10" selected>10%</option>
    <option value="1.15">15%</option>
    <option value="1.20">20%</option>
  </select>

  <button onclick="calculateGrout()">Calculate Grout</button>

  <div class="result" id="groutResult"></div>
  
</div>
  
  <a href="/">← Back to HOPR</a>

  <script>
    function runBasicCalc() {
      const input = document.getElementById("basicCalc").value;

      try {
        const result = Function('"use strict"; return (' + input + ')')();

        if (isNaN(result)) {
          document.getElementById("basicResult").textContent = "Enter a valid calculation.";
        } else {
          document.getElementById("basicResult").textContent = "Result: " + result;
        }
      } catch {
        document.getElementById("basicResult").textContent = "Invalid calculation.";
      }
    }

    function calculateSqFt() {
      const length = parseFloat(document.getElementById("length").value);
      const width = parseFloat(document.getElementById("width").value);

      if (isNaN(length) || isNaN(width)) {
        document.getElementById("sqftResult").textContent = "Enter length and width.";
        return;
      }

      const sqft = length * width;

      document.getElementById("sqftResult").textContent =
        "Square Footage: " + sqft.toFixed(2) + " sq ft";
    }

    function calculateTax() {
      const subtotal = parseFloat(document.getElementById("subtotal").value);
      const taxRate = 0.0725;

      if (isNaN(subtotal)) {
        document.getElementById("taxResult").textContent = "Enter a subtotal.";
        return;
      }

      const tax = subtotal * taxRate;
      const total = subtotal + tax;

      document.getElementById("taxResult").innerHTML =
        "Tax: $" + tax.toFixed(2) + "<br>" +
        "Total: $" + total.toFixed(2);
    }

function calculateGrout() {
  const sqft = parseFloat(document.getElementById("groutSqft").value);
  const tileLength = parseFloat(document.getElementById("tileLength").value);
  const tileWidth = parseFloat(document.getElementById("tileWidth").value);
  const jointWidth = parseFloat(document.getElementById("jointWidth").value);

  const depthInchesInput = parseFloat(document.getElementById("groutDepthInches").value);
  const depthMMInput = parseFloat(document.getElementById("groutDepthMM").value);

  const bagCoverage = parseFloat(document.getElementById("bagCoverage").value);
  const wasteBuffer = parseFloat(document.getElementById("wasteBuffer").value);

  let groutDepth;

  if (!isNaN(depthInchesInput) && depthInchesInput > 0) {
    groutDepth = depthInchesInput;
  } else if (!isNaN(depthMMInput) && depthMMInput > 0) {
    groutDepth = depthMMInput / 25.4;
  } else {
    document.getElementById("groutResult").textContent =
      "Enter tile thickness in inches or millimeters.";
    return;
  }

  if (
    isNaN(sqft) ||
    isNaN(tileLength) ||
    isNaN(tileWidth) ||
    isNaN(jointWidth) ||
    isNaN(bagCoverage)
  ) {
    document.getElementById("groutResult").textContent =
      "Enter all required grout calculator fields.";
    return;
  }

  if (
    sqft <= 0 ||
    tileLength <= 0 ||
    tileWidth <= 0 ||
    jointWidth <= 0 ||
    groutDepth <= 0 ||
    bagCoverage <= 0
  ) {
    document.getElementById("groutResult").textContent =
      "All numbers must be greater than zero.";
    return;
  }

  const adjustedSqft = sqft * wasteBuffer;
  const containersNeeded = Math.ceil(adjustedSqft / bagCoverage);

  const depthMM = groutDepth * 25.4;

  document.getElementById("groutResult").innerHTML =
    "Tile Thickness Used: " + groutDepth.toFixed(3) + " in / " + depthMM.toFixed(1) + " mm<br>" +
    "Adjusted Project Size: " + adjustedSqft.toFixed(2) + " sq ft<br>" +
    "Recommended Containers: " + containersNeeded + "<br><br>" +
    "<small>Coverage is approximate. Verify with product packaging or manufacturer coverage charts.</small>";
}
    
  </script>

</body>
</html>
